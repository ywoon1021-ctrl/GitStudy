<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background-color: #f4f6f8;
        color: #333;
      }

      /* 카드 */
      .wrapper {
        max-width: 700px;
        margin: 60px auto;
        background: white;
        padding: 40px 50px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      /* 제목 */
      h1 {
        margin-bottom: 8px;
        font-size: 26px;
        color: #222;
      }

      h2 {
        margin-bottom: 25px;
        font-size: 18px;
        color: #666;
        border-left: 4px solid #1a73e8;
        padding-left: 10px;
      }

      /* 리스트 */
      .list {
        line-height: 1.9;
        font-size: 14px;
      }

      /* 항목 */
      .item {
        padding: 10px 12px;
        margin-bottom: 10px;
        border-radius: 8px;
        background: #f8fafc;
        transition: 0.2s;
      }

      .item:hover {
        background: #e9f2ff;
        transform: translateX(4px);
      }

      /* 서브 설명 */
      .sub {
        margin-left: 15px;
        font-size: 13px;
        color: #666;
      }

      /* 버튼 */
      button {
        margin-top: 30px;
        padding: 10px 16px;
        border: none;
        background-color: #1a73e8;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background-color: #1557b0;
      }
    </style>
  </head>
  <body>
    <h1>git master</h1>
    <h2>git 기초</h2>
    <div>
      1. vs경우 오른쪽 3번째 아이콘으로 add, commit 가능 <br />
      2. 파일 옆에 있는 +를 누르면 add -는 add 취소 <br />
      3. commit원하면 ✓commit, message input 에 메세지 추가 가능 <br />
      3_1. commit 전에 현재파일 vs 최근 파일 차이점 한번 확인 하길 <br />
    </div>
    <button onclick="history.back()">뒤로가기</button>
  </body>
</html>
